# fly.toml — example for Fly.io production deploy.
# Replace `app` name, then: fly launch / fly deploy
# Docs: docs/PRODUCTION_HOSTING.md

app = "ai-commerce-suite-shopify"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  BILLING_DEV_BYPASS = "0"
  BILLING_TEST_CHARGES = "0"
  SCOPES = "read_products,write_products"
  DATABASE_URL = "file:/data/prod.sqlite"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "shopify_data"
  destination = "/data"
