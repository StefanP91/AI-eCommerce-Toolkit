# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "dcf856197337df13d712c2c6b6188bd7"
name = "AI Commerce Suite"
# Public URL is the Netlify Shopify PROXY (not marketing site, not bare Render).
# Proxy shows branded loader while Render wakes, then serves the app same-origin.
application_url = "https://ai-commerce-suite-shopify.netlify.app"
embedded = true

[build]
# Keep production Render URLs — do not let `shopify app dev` overwrite them.
automatically_update_urls_on_dev = false
include_config_on_deploy = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["app_subscriptions/update"]
  uri = "/webhooks/app/subscriptions_update"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/compliance"

[access_scopes]
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://ai-commerce-suite-shopify.netlify.app/auth/callback",
  "https://ai-commerce-suite-shopify.netlify.app/auth/shopify/callback"
]
