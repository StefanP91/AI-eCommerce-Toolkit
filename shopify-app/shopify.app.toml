# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "dcf856197337df13d712c2c6b6188bd7"
name = "AI Commerce Suite"
# Netlify boot UI while Render wakes — never show Render's cold-start page in Admin.
application_url = "https://ai-ecommerce-suite.netlify.app/shopify-app-boot"
embedded = true

[build]
# Keep production Render URLs — do not let `shopify app dev` overwrite them.
automatically_update_urls_on_dev = false
include_config_on_deploy = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["app_subscriptions/update"]
  uri = "/webhooks/app/subscriptions_update"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/compliance"

[access_scopes]
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://ai-ecommerce-shopify-app.onrender.com/auth/callback",
  "https://ai-ecommerce-shopify-app.onrender.com/auth/shopify/callback"
]
