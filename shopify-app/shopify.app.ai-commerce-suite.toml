# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "dcf856197337df13d712c2c6b6188bd7"
name = "AI Commerce Suite"
# Public URL = Netlify Shopify PROXY (never marketing site).
application_url = "https://ai-commerce-suite-shopify.netlify.app"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["app_subscriptions/update"]
  uri = "/webhooks/app/subscriptions_update"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/compliance"

[access_scopes]
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://ai-commerce-suite-shopify.netlify.app/auth/callback",
  "https://ai-commerce-suite-shopify.netlify.app/auth/shopify/callback"
]
