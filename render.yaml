databases:
  - name: ai-commerce-db
    plan: free
    databaseName: ai_commerce
    user: ai_commerce

services:
  - type: web
    name: ai-commerce-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: AI Commerce Suite
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: ai-commerce-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
