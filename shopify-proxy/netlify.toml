# Dedicated Shopify app edge — NOT the marketing site.
# Publish this folder as its own Netlify site (e.g. ai-commerce-suite-shopify).

[build]
  publish = "public"
  command = "echo shopify-proxy"

# Gate ALL GETs for Render cold-start HTML. POSTs return next() immediately
# so Optimize is handled by the redirect proxy (no Edge timeout).
[[edge_functions]]
  function = "cold-start-gate"
  path = "/*"

[[redirects]]
  from = "/*"
  to = "https://ai-ecommerce-shopify-app.onrender.com/:splat"
  status = 200
  force = true
